name: Global News Automation Engine

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Fetch Current Repository Code
      uses: actions/checkout@v4

    - name: Setup Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Runtime Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install feedparser requests deep-translator

    - name: Execute Ingestion and Translation Script
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python bot.py

    - name: Commit Updated State back to Git
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "chore: update sent links index state [skip ci]"
        file_pattern: "state.json"